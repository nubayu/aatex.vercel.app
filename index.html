<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AATEX-1 COMMAND CENTER</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts untuk nuansa Game/Militer -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Rajdhani', 'sans-serif'],
                        display: ['Teko', 'sans-serif'],
                    },
                    colors: {
                        pubg: {
                            orange: '#F26822',
                            yellow: '#F2A900',
                            dark: '#121212',
                            panel: '#1A1C1E',
                            border: '#333333',
                            green: '#4A5D23'
                        }
                    },
                    backgroundImage: {
                        'grunge': "url('https://www.transparenttextures.com/patterns/black-scales.png')",
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Base Styling & Scrollbar */
        body {
            background-color: #0f1011;
            background-image: 
                linear-gradient(rgba(15, 16, 17, 0.9), rgba(15, 16, 17, 0.95)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #121212; border-left: 1px solid #333; }
        ::-webkit-scrollbar-thumb { background: #F26822; }
        ::-webkit-scrollbar-thumb:hover { background: #F2A900; }

        /* Scanline Effect (Efek layar game retro/taktikal) */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.3;
        }

        /* HUD Card Styling (Bingkai kotak bidikan) */
        .hud-card {
            position: relative;
            background: linear-gradient(135deg, rgba(26,28,30,0.9) 0%, rgba(18,18,18,0.95) 100%);
            border: 1px solid #333;
            transition: all 0.2s ease-out;
            clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px));
        }
        
        .hud-card::before, .hud-card::after {
            content: ''; position: absolute; width: 10px; height: 10px;
            border: 2px solid transparent; transition: all 0.3s;
        }
        .hud-card::before { top: 0; left: 0; }
        .hud-card::after { bottom: 0; right: 0; }

        .hud-card:hover {
            transform: scale(1.02);
            border-color: #F26822;
            box-shadow: inset 0 0 20px rgba(242, 104, 34, 0.1), 0 0 15px rgba(242, 104, 34, 0.3);
        }

        .hud-card:hover::before { border-top-color: #F2A900; border-left-color: #F2A900; }
        .hud-card:hover::after { border-bottom-color: #F2A900; border-right-color: #F2A900; }

        /* Glitch text effect on hover for header */
        .glitch-hover:hover {
            animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
            color: #F2A900;
        }
        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            20% { transform: skew(-10deg); }
            40% { transform: skew(10deg); }
            60% { transform: skew(-5deg); }
            80% { transform: skew(5deg); }
            100% { transform: skew(0deg); }
        }
    </style>
</head>
<body class="text-gray-300 font-sans antialiased min-h-screen flex flex-col relative selection:bg-pubg-orange selection:text-white">
    <div class="scanlines"></div>

    <!-- ========================================================================= -->
    <!-- DATA DOKUMEN (TIDAK ADA YANG DIRUBAH PADA DATANYA)                          -->
    <!-- ========================================================================= -->
    <script>

                    { nama: "HPP Kain", link: "https://docs.google.com/spreadsheets/d/19K5w2MrB12o3cbX-SnhsYjQVhb2MHs0vd2Qcvlp7rMI/edit?usp=drive_link" },
                    { nama: "Bayaran Mingguan", link: "https://drive.google.com/drive/folders/11W2Dz_xrSCacy2qqTmB8xqMuD3Orn1CB?usp=drive_link" },

                    { nama: "Laporan Stock Kain", link: "https://drive.google.com/drive/folders/1dyul0a8Hm9aknfvckJqF-POO_S6LCgOr?usp=drive_link" },

                    { nama: "Laporan Penjualan Limbah", link: "https://drive.google.com/drive/folders/17cPSVWQyO4seSyaRHZbY-dhu-gXXVvnJ?usp=drive_link" },

    <!-- ========================================================================= -->

    <!-- Header HUD -->
    <header class="bg-pubg-dark/90 backdrop-blur-sm border-b-2 border-pubg-orange shadow-[0_4px_20px_rgba(242,104,34,0.15)] sticky top-0 z-50">
        <!-- Top accent line -->
        <div class="h-1 w-full bg-gradient-to-r from-pubg-yellow via-pubg-orange to-pubg-yellow"></div>
        
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-5">
                
                <!-- Logo & Title -->
                <div class="flex items-center gap-4">
                    <div class="relative flex items-center justify-center w-14 h-14 bg-zinc-800 border-2 border-pubg-orange transform rotate-45 overflow-hidden group">
                        <!-- Pseudo logo PUBG Style (Ganti src="logo.webp" bila perlu) -->
                        <div class="transform -rotate-45 font-display text-2xl font-bold text-pubg-yellow group-hover:scale-110 transition-transform">ATX</div>
                    </div>
                    <div>
                        <h1 class="text-3xl md:text-4xl font-display font-bold text-white tracking-wider uppercase glitch-hover" style="text-shadow: 2px 2px 0px #000;">
                            Aatex-1 <span class="text-pubg-orange">Intel</span>
                        </h1>
                        <div class="flex items-center gap-2 text-xs font-bold tracking-[0.2em] text-pubg-yellow uppercase">
                            <span class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></span>
                            Tactical Database Live
                        </div>
                    </div>
                </div>

                <!-- Search Bar (HUD Input) -->
                <div class="relative w-full md:w-[400px]">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <!-- Crosshair Icon -->
                        <svg class="w-5 h-5 text-pubg-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v4m0 8v4m-8-8h4m8 0h4m-6-6L9.5 9.5m5 5L14.5 14.5"></path><circle cx="12" cy="12" r="8" stroke-width="1.5" stroke-dasharray="2 2"></circle></svg>
                    </div>
                    <input type="text" id="searchInput" 
                        class="block w-full pl-12 pr-4 py-3 bg-zinc-900/80 border border-pubg-border text-white placeholder-gray-500 font-sans font-medium uppercase tracking-wider focus:outline-none focus:border-pubg-yellow focus:ring-1 focus:ring-pubg-yellow transition-all clip-path-tactical-input" 
                        placeholder="SCAN TARGET DOCUMENT..."
                        style="clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);">
                    
                    <!-- Decorative right corner -->

                </div>
            </div>
        </div>
    </header>

    <!-- Konten Utama (BATTLEGROUND) -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full relative z-10">
        
        <!-- Pesan Kosong (Target Missed) -->
        <div id="noResults" class="hidden text-center py-20">
            <div class="inline-block p-4 border-2 border-red-600/50 rounded-full bg-red-600/10 mb-4 animate-pulse">
                <svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h3 class="text-2xl font-display font-bold text-red-500 uppercase tracking-widest">Target Not Found</h3>
            <p class="text-gray-400 font-medium uppercase tracking-wider mt-2">Adjust your scopes and try searching again.</p>
        </div>

        <!-- Container Dokumen Dinamis -->
        <div id="documentContainer" class="space-y-12"></div>
    </main>

    <!-- Footer -->
    <footer class="bg-pubg-dark border-t border-pubg-border mt-auto relative z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col md:flex-row items-center justify-between">
            <p class="text-sm font-bold text-gray-500 tracking-widest uppercase">
                &copy; <script>document.write(new Date().getFullYear())</script> AATEX-1 COMMAND CENTER. 
            </p>
            <div class="flex items-center gap-2 mt-4 md:mt-0 text-pubg-orange text-sm font-display tracking-widest">
                <span>SERVER: ONLINE</span>
                <span class="w-1 h-4 bg-pubg-orange animate-ping"></span>
            </div>
        </div>
    </footer>

    <!-- Script Render HTML dan Pencarian (Logika tidak diubah, hanya pemetaan warnanya saja) -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('documentContainer');
            
            // Konfigurasi class warna ditranslasi ke tema PUBG
            // Biru -> Oranye Taktikal, Ungu -> Kuning Airdrop, Emerald -> Hijau Militer
            const colorClasses = {
                blue: { 
                    badge: "bg-pubg-orange/20 text-pubg-orange border-pubg-orange", 
                    iconBg: "bg-pubg-orange/10",
                    iconColor: "text-pubg-orange group-hover:text-white", 
                    textHover: "group-hover:text-pubg-orange" 
                },
                purple: { 
                    badge: "bg-pubg-yellow/20 text-pubg-yellow border-pubg-yellow", 
                    iconBg: "bg-pubg-yellow/10",
                    iconColor: "text-pubg-yellow group-hover:text-white", 
                    textHover: "group-hover:text-pubg-yellow" 
                },
                emerald: { 
                    badge: "bg-pubg-green/30 text-green-400 border-pubg-green", 
                    iconBg: "bg-pubg-green/20",
                    iconColor: "text-green-500 group-hover:text-white", 
                    textHover: "group-hover:text-green-400" 
                },
                red: { 
                    badge: "bg-red-500/20 text-red-500 border-red-500", 
                    iconBg: "bg-red-500/10",
                    iconColor: "text-red-500 group-hover:text-white", 
                    textHover: "group-hover:text-red-500" 
                },
                orange: { 
                    badge: "bg-gray-500/20 text-gray-400 border-gray-500", 
                    iconBg: "bg-gray-500/10",
                    iconColor: "text-gray-400 group-hover:text-white", 
                    textHover: "group-hover:text-gray-300" 
                }
            };

            // 1. Render HTML secara dinamis
            DATA_DOKUMEN.forEach(kategoriData => {
                const colors = colorClasses[kategoriData.temaWarna] || colorClasses.blue;
                const jumlahDokumen = kategoriData.dokumen.length;

                let sectionHTML = `
                <section class="category-section" data-category="${kategoriData.kategori}">
                    <div class="flex items-center gap-4 mb-6 border-b border-pubg-border pb-2 relative">
                        <div class="absolute -bottom-[1px] left-0 w-24 h-[2px] bg-pubg-orange"></div>
                        <h2 class="text-3xl font-display font-bold text-white tracking-widest uppercase">${kategoriData.kategori}</h2>
                        <span class="border ${colors.badge} text-sm font-bold px-3 py-1 font-display tracking-widest flex items-center gap-1">
                            SQUAD <span class="text-white ml-1">[ ${jumlahDokumen} ]</span>
                        </span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                `;

                kategoriData.dokumen.forEach(doc => {
                    sectionHTML += `
                        <a href="${doc.link}" target="_blank" class="hud-card group block p-5">
                            <div class="flex items-start gap-4 h-full">
                                <div class="mt-0.5 flex-shrink-0 p-2 border border-pubg-border ${colors.iconBg} ${colors.iconColor} transition-colors duration-300 transform group-hover:rotate-12 group-hover:bg-pubg-orange">
                                    ${kategoriData.ikon}
                                </div>
                                <div class="flex flex-col justify-center h-full">
                                    <h3 class="text-base font-semibold text-gray-200 ${colors.textHover} uppercase tracking-wider leading-tight doc-title transition-colors">
                                        ${doc.nama}
                                    </h3>
                                    <div class="mt-2 flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                        <span class="h-[1px] w-4 bg-pubg-orange"></span>
                                        <span class="text-[10px] font-display text-pubg-orange tracking-[0.2em]">ACCESS DATA</span>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Tactical HUD details -->
                            <div class="absolute top-2 right-2 text-[8px] font-display text-gray-600 tracking-widest">ID: ${Math.floor(Math.random() * 9000) + 1000}</div>
                        </a>
                    `;
                });

                sectionHTML += `</div></section>`;
                container.innerHTML += sectionHTML;
            });

            // 2. Logika Pencarian
            const searchInput = document.getElementById('searchInput');
            const categorySections = document.querySelectorAll('.category-section');
            const noResultsMessage = document.getElementById('noResults');

            searchInput.addEventListener('input', function(e) {
                const searchTerm = e.target.value.toLowerCase();
                let totalVisibleItems = 0;

                categorySections.forEach(section => {
                    const cards = section.querySelectorAll('.hud-card');
                    let visibleInThisSection = 0;

                    cards.forEach(card => {
                        const title = card.querySelector('.doc-title').textContent.toLowerCase();
                        if (title.includes(searchTerm)) {
                            card.style.display = 'block';
                            visibleInThisSection++;
                            totalVisibleItems++;
                        } else {
                            card.style.display = 'none';
                        }
                    });

                    if (visibleInThisSection > 0) {
                        section.style.display = 'block';
                        // Update badge counter
                        section.querySelector('span.text-white').textContent = `[ ${visibleInThisSection} ]`;
                    } else {
                        section.style.display = 'none';
                    }
                });

                if (totalVisibleItems === 0) {
                    noResultsMessage.classList.remove('hidden');
                } else {
                    noResultsMessage.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
